<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Support | Welm.app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="/">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__wordmark">Welm.app</span>
        </a>
        <nav aria-label="Site links">
          <button class="header-download" type="button" data-download-open>Download</button>
          <a class="mobile-download" href="https://apps.apple.com/us/app/welm/id6752449247">Download</a>
        </nav>
      </div>
    </header>

    <dialog class="download-modal" aria-labelledby="download-modal-title">
      <h2 id="download-modal-title">Download for iOS</h2>
      <div
        class="qr"
        role="img"
        aria-label="QR code to open Welm in the App Store"
      ></div>
    </dialog>

    <main class="site-main legal-page">
      <div class="container">
        <section aria-labelledby="support-title">
          <h1 id="support-title">Support</h1>
          <p>Need help or have a question? Send us an email:</p>
          <p><a href="mailto:hello@welm.app">hello@welm.app</a></p>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <nav class="site-footer__nav" aria-label="Footer">
          <button type="button" class="footer-nav-link" data-download-open>Download</button>
          <a href="privacy.html">Privacy Policy</a>
          <a href="support.html">Support</a>
        </nav>
        <p class="site-footer__copyright">Copyright &copy; 2026</p>
      </div>
    </footer>

    <script src="modal.js"></script>
  </body>
</html>
